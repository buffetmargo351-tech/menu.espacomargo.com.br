function decodeUtf8Base64(b64){
  const bin=atob(b64);
  if(typeof TextDecoder!=='undefined'){
    const bytes=Uint8Array.from(bin,c=>c.charCodeAt(0));
    return new TextDecoder().decode(bytes);
  }
  let encoded='';
  for(let i=0;i<bin.length;i++){
    encoded+='%'+bin.charCodeAt(i).toString(16).padStart(2,'0');
  }
  try{return decodeURIComponent(encoded)}
  catch{return bin}
}
function esc(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}
function formatDate(value){const s=String(value||'').trim();if(/^\d{2}\/\d{2}\/\d{4}$/.test(s))return s;if(/^\d{4}-\d{2}-\d{2}$/.test(s)){const [y,m,d]=s.split('-');return `${d}/${m}/${y}`}return s}
function isoDate(value){const s=String(value||'').trim();if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;const m=s.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);return m?`${m[3]}-${m[2]}-${m[1]}`:''}
function daysUntil(value){const iso=isoDate(value);if(!iso)return 0;const today=new Date();today.setHours(0,0,0,0);const event=new Date(iso+'T12:00:00');event.setHours(0,0,0,0);return Math.max(0,Math.ceil((event-today)/86400000))}
function getFriendlyRoute(){
  const params=new URLSearchParams(location.search);
  const casalIdQuery=(
    params.get('c') ||
    params.get('casal_id') ||
    ''
  ).trim();
  const slugQuery=(params.get('slug')||'').trim();

  if(casalIdQuery){
    return{
      casal_id:casalIdQuery,
      slug:slugQuery
    };
  }

  const partes=location.pathname
    .split('/')
    .filter(Boolean)
    .map(parte=>{
      try{return decodeURIComponent(parte)}
      catch{return parte}
    });

  if(
    partes.length>=2 &&
    !/\.html?$/i.test(partes[0])
  ){
    return{
      casal_id:(partes[0]||'').trim(),
      slug:(partes[1]||'').trim()
    };
  }

  return{casal_id:'',slug:''};
}


function fetchJsonWithTimeout(url,timeout=9000){
  const controller=typeof AbortController!=='undefined'
    ? new AbortController()
    : null;
  const timer=setTimeout(()=>controller?.abort(),timeout);

  return fetch(url,{
    method:'GET',
    cache:'no-store',
    signal:controller?.signal
  })
    .then(response=>{
      if(!response.ok)throw new Error(`HTTP ${response.status}`);
      return response.json();
    })
    .finally(()=>clearTimeout(timer));
}

function jsonpRequest(url,timeout=14000){
  return new Promise((resolve,reject)=>{
    const callback=
      `margoJsonp_${Date.now()}_${Math.random().toString(36).slice(2)}`;
    const script=document.createElement('script');
    const separator=url.includes('?')?'&':'?';
    const timer=setTimeout(()=>{
      cleanup();
      reject(new Error('Tempo esgotado ao carregar a proposta.'));
    },timeout);

    function cleanup(){
      clearTimeout(timer);
      script.remove();
      try{delete window[callback]}catch{window[callback]=undefined}
    }

    window[callback]=result=>{
      cleanup();
      resolve(result);
    };

    script.onerror=()=>{
      cleanup();
      reject(new Error('Não foi possível acessar os dados da proposta.'));
    };

    script.src=
      `${url}${separator}callback=${encodeURIComponent(callback)}`;
    document.head.appendChild(script);
  });
}

async function requestProposalData(url){
  try{
    return await fetchJsonWithTimeout(url,9000);
  }catch(fetchError){
    console.warn('Fetch da proposta falhou; tentando modo compatível.',fetchError);
    return jsonpRequest(url,14000);
  }
}

async function getData(){

  if(rota.casal_id){
    try{
      const url=`${ATELIE_API_URL}?acao=obter_proposta&casal_id=${encodeURIComponent(rota.casal_id)}&slug=${encodeURIComponent(rota.slug)}&_=${Date.now()}`;
      const result=await requestProposalData(url);
      if(!result.ok)throw new Error(result.erro||'Proposta não encontrada.');

      const proposta={...DEFAULT_DATA,...result.proposta};

      return proposta;
    }catch(error){
      console.error('Falha ao carregar proposta personalizada:',error);
      showProposalLoadError(
        error?.message || 'Não foi possível carregar esta proposta.'
      );
      throw error;
    }
  }

  const params=new URLSearchParams(location.search);
  const id=params.get('proposta_id')||'';
  const token=params.get('token')||'';

  if(id&&token){
    try{
      const url=`${ATELIE_API_URL}?acao=obter_proposta&proposta_id=${encodeURIComponent(id)}&token=${encodeURIComponent(token)}&_=${Date.now()}`;
      const result=await requestProposalData(url);
      if(!result.ok)throw new Error(result.erro||'Proposta não encontrada.');
      return {...DEFAULT_DATA,...result.proposta};
    }catch(error){
      console.error('Falha ao carregar proposta online:',error);
      showProposalLoadError(
        error?.message || 'Não foi possível carregar esta proposta.'
      );
      throw error;
    }
  }

  try{
    if(id){
      const raw=localStorage.getItem('margo_proposta_'+id);
      if(raw)return {...DEFAULT_DATA,...JSON.parse(raw)};
    }
  }catch(e){console.warn(e)}

  try{
    const raw=sessionStorage.getItem('margo_last_proposal_payload_v46');
    if(raw)return {...DEFAULT_DATA,...JSON.parse(raw)};
  }catch(e){}

  return DEFAULT_DATA;
}

function isMobileFlow(){return window.matchMedia('(max-width:900px)').matches}

function installMobileFlow(frame){
  if(!isMobileFlow())return;
  const doc=frame.contentDocument;
  if(!doc)return;

  const label=frame.parentElement?.dataset?.pageLabel||'';
  let style=doc.getElementById('margo-mobile-flow');
  if(!style){
    style=doc.createElement('style');
    style.id='margo-mobile-flow';
    style.textContent=`
      html,body{height:auto!important;min-height:0!important;overflow:hidden!important}
      body{display:block!important;align-items:stretch!important}
      .phone-frame{width:100%!important;max-width:430px!important;height:auto!important;min-height:0!important;margin:0 auto!important;overflow:hidden!important}
      .page{height:auto!important;min-height:0!important;padding-bottom:26px!important}
      .footer{position:static!important;margin-top:20px!important}
    `;
    if(label==='Capa'){
      style.textContent+=`
        .phone-frame,.cover{min-height:141.42vw!important;height:auto!important}
        .cover{padding-bottom:30px!important}
      `;
    }
    doc.head.appendChild(style);
  }

  const resize=()=>{
    if(!isMobileFlow())return;
    const root=doc.querySelector('.phone-frame')||doc.body||doc.documentElement;
    const height=Math.max(
      root?.scrollHeight||0,
      Math.ceil(root?.getBoundingClientRect?.().height||0)
    );
    if(height>0&&Math.abs(frame.getBoundingClientRect().height-height)>1){
      frame.style.height=`${height}px`;
    }
  };

  resize();
  setTimeout(resize,80);
  setTimeout(resize,300);
  setTimeout(resize,900);

  if(!frame._margoResizeObserver&&window.ResizeObserver){
    const observer=new ResizeObserver(resize);
    const root=doc.querySelector('.phone-frame')||doc.documentElement;
    observer.observe(root);
    frame._margoResizeObserver=observer;
  }

  [...doc.images].forEach(img=>{
    if(!img.complete)img.addEventListener('load',resize,{once:true});
  });

  if(doc.fonts?.ready)doc.fonts.ready.then(resize).catch(()=>{});
}

function restoreDesktopFrames(){
  document.querySelectorAll('.page-shell iframe').forEach(frame=>{
    if(!isMobileFlow()){
      frame._margoResizeObserver?.disconnect?.();
      frame._margoResizeObserver=null;
      frame.contentDocument?.getElementById('margo-mobile-flow')?.remove();
      frame.style.height='100%';
    }else{
      installMobileFlow(frame);
    }
  });
}

function waitForFirstFrame(frame,timeout=1100){

    new Promise(resolve=>{
      if(frame?.contentDocument?.readyState==='complete')resolve();
      else frame?.addEventListener('load',resolve,{once:true});
    }),
    new Promise(resolve=>setTimeout(resolve,timeout))
  ]);
}
