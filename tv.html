<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>Experiência Margô — TV V49.9</title>

  <style>
    :root {
      --safe-x: 6vw;
      --safe-y: 5vh;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden !important;
      background: #07110d;
      overscroll-behavior: none;
      touch-action: none;
    }

    #safeViewport {
      position: fixed;
      inset:
        var(--safe-y)
        var(--safe-x)
        var(--safe-y)
        var(--safe-x);
      overflow: hidden;
      background: #07110d;
      contain: strict;
    }

    #tvStage {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 1366px;
      height: 768px;
      transform-origin: 50% 50%;
      transform: translate(-50%, -50%) scale(.75);
      will-change: transform;
      backface-visibility: hidden;
      background: #07110d;
    }

    #tvStage iframe {
      display: block;
      width: 1366px;
      height: 768px;
      border: 0;
      overflow: hidden;
      background: #07110d;
    }

    #tvLoading {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 32px;
      color: #dcc493;
      background: #07110d;
      text-align: center;
      font: 700 20px/1.45 Arial, sans-serif;
      letter-spacing: .08em;
    }

    #tvLoading.hidden {
      display: none;
    }
  </style>
</head>

<body>
  <div id="tvLoading">
    CARREGANDO EXPERIÊNCIA MARGÔ...
  </div>

  <div id="safeViewport">
    <div id="tvStage">
      <iframe
        id="tvFrame"
        src="./index.html?modo=tv"
        title="Menu Digital Espaço Margô"
        allow="fullscreen"
        allowfullscreen>
      </iframe>
    </div>
  </div>

  <script>
    const BASE_WIDTH = 1366;
    const BASE_HEIGHT = 768;

    function getSafeViewportSize() {
      const rect =
        document
          .getElementById('safeViewport')
          .getBoundingClientRect();

      return {
        width: Math.max(1, rect.width),
        height: Math.max(1, rect.height)
      };
    }

    function fitTv() {
      const viewport = getSafeViewportSize();

      const scale = Math.min(
        viewport.width / BASE_WIDTH,
        viewport.height / BASE_HEIGHT
      );

      document
        .getElementById('tvStage')
        .style
        .transform =
          `translate(-50%, -50%) translateZ(0) scale(${scale})`;
    }

    function scheduleFit() {
      [0, 80, 220, 500, 1000, 1800].forEach(delay => {
        window.setTimeout(fitTv, delay);
      });
    }

    async function requestTvFullscreen() {
      const target = document.documentElement;

      const request =
        target.requestFullscreen ||
        target.webkitRequestFullscreen ||
        target.msRequestFullscreen;

      if (!request) {
        alert(
          'O navegador desta TV não disponibiliza o modo de tela cheia.'
        );
        return;
      }

      try {
        await request.call(target);
      } catch (error) {
        console.warn(
          'Não foi possível ativar a tela cheia:',
          error
        );
      }

      scheduleFit();
    }

    function connectFullscreenButton() {
      const frame = document.getElementById('tvFrame');

      try {
        const frameWindow = frame.contentWindow;
        const frameDocument = frame.contentDocument;

        frameWindow.abrirTelaCheia =
          requestTvFullscreen;

        const button =
          frameDocument.querySelector('.fullscreen-btn');

        if (
          !button ||
          button.dataset.tvFullscreenConnected === 'SIM'
        ) {
          return;
        }

        button.dataset.tvFullscreenConnected = 'SIM';
        button.removeAttribute('onclick');

        button.addEventListener(
          'click',
          event => {
            event.preventDefault();
            event.stopPropagation();
            event.stopImmediatePropagation();

            requestTvFullscreen();

            return false;
          },
          true
        );
      } catch (error) {
        console.warn(
          'Não foi possível conectar o botão Tela cheia:',
          error
        );
      }
    }

    function afterViewportChange() {
      scheduleFit();

      window.setTimeout(
        connectFullscreenButton,
        250
      );
    }

    window.addEventListener(
      'resize',
      afterViewportChange
    );

    window.addEventListener(
      'orientationchange',
      afterViewportChange
    );

    window.visualViewport?.addEventListener(
      'resize',
      afterViewportChange
    );

    document.addEventListener(
      'fullscreenchange',
      afterViewportChange
    );

    document.addEventListener(
      'webkitfullscreenchange',
      afterViewportChange
    );

    document.addEventListener(
      'MSFullscreenChange',
      afterViewportChange
    );

    if ('ResizeObserver' in window) {
      new ResizeObserver(scheduleFit)
        .observe(
          document.getElementById('safeViewport')
        );
    }

    document
      .getElementById('tvFrame')
      .addEventListener('load', () => {
        document
          .getElementById('tvLoading')
          .classList.add('hidden');

        connectFullscreenButton();
        scheduleFit();

        [300, 700, 1400, 2500, 4000].forEach(delay => {
          window.setTimeout(
            connectFullscreenButton,
            delay
          );
        });
      });

    scheduleFit();
  </script>
</body>
</html>
