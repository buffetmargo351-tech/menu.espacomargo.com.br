<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>Experiência Margô — TV V49.8</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden !important;
      background: #07110d;
      overscroll-behavior: none;
      touch-action: none;
    }

    /*
      A moldura recorta qualquer excesso que o navegador da TV tente
      desenhar fora da área realmente visível.
    */
    #tvViewport {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: #07110d;
      contain: strict;
    }

    /*
      O Menu continua trabalhando internamente em 1366 × 768,
      que é o layout já aprovado no computador.
    */
    #tvStage {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 1366px;
      height: 768px;
      transform-origin: 50% 50%;
      transform: translate(-50%, -50%) scale(.7);
      will-change: transform;
      backface-visibility: hidden;
      background: #07110d;
    }

    #tvStage iframe {
      display: block;
      width: 1366px;
      height: 768px;
      border: 0;
      overflow: hidden;
      background: #07110d;
    }

    #tvLoading {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 30px;
      color: #dcc493;
      background: #07110d;
      text-align: center;
      font: 700 20px/1.4 Arial, sans-serif;
      letter-spacing: .08em;
    }

    #tvLoading.hidden {
      display: none;
    }
  </style>
</head>

<body>
  <div id="tvLoading">CARREGANDO EXPERIÊNCIA MARGÔ...</div>

  <div id="tvViewport">
    <div id="tvStage">
      <iframe
        id="tvFrame"
        src="./index.html?modo=tv"
        title="Menu Digital Espaço Margô"
        allow="fullscreen"
        allowfullscreen>
      </iframe>
    </div>
  </div>

  <script>
    const BASE_WIDTH = 1366;
    const BASE_HEIGHT = 768;

    /*
      Reserva técnica contra o overscan das Smart TVs.
      A diferença é pequena visualmente, mas impede corte nas quatro bordas.
    */
    const SAFE_SCALE_NORMAL = 0.965;
    const SAFE_SCALE_FULLSCREEN = 0.975;

    function isFullscreen() {
      return Boolean(
        document.fullscreenElement ||
        document.webkitFullscreenElement ||
        document.msFullscreenElement
      );
    }

    function visibleViewport() {
      const visual = window.visualViewport;

      const widths = [
        visual?.width,
        document.documentElement.clientWidth,
        window.innerWidth
      ].filter(value => Number.isFinite(value) && value > 0);

      const heights = [
        visual?.height,
        document.documentElement.clientHeight,
        window.innerHeight
      ].filter(value => Number.isFinite(value) && value > 0);

      return {
        width: Math.min(...widths),
        height: Math.min(...heights)
      };
    }

    function fitTv() {
      const viewport = visibleViewport();
      const safety = isFullscreen()
        ? SAFE_SCALE_FULLSCREEN
        : SAFE_SCALE_NORMAL;

      const scale = Math.min(
        viewport.width / BASE_WIDTH,
        viewport.height / BASE_HEIGHT
      ) * safety;

      const stage = document.getElementById('tvStage');

      stage.style.transform =
        `translate(-50%, -50%) translateZ(0) scale(${scale})`;
    }

    function scheduleFit() {
      [0, 80, 220, 500, 1000].forEach(delay => {
        window.setTimeout(fitTv, delay);
      });
    }

    async function requestTvFullscreen() {
      const target = document.documentElement;

      const request =
        target.requestFullscreen ||
        target.webkitRequestFullscreen ||
        target.msRequestFullscreen;

      if (!request) {
        alert(
          'O navegador desta TV não disponibiliza o modo de tela cheia.'
        );
        return;
      }

      try {
        await request.call(target);
      } catch (error) {
        console.warn(
          'Não foi possível ativar a tela cheia:',
          error
        );
      }

      scheduleFit();
    }

    function connectFullscreenButton() {
      const frame = document.getElementById('tvFrame');

      try {
        const frameWindow = frame.contentWindow;
        const frameDocument = frame.contentDocument;

        frameWindow.abrirTelaCheia = requestTvFullscreen;

        const button =
          frameDocument.querySelector('.fullscreen-btn');

        if (!button || button.dataset.tvFullscreenConnected === 'SIM') {
          return;
        }

        button.dataset.tvFullscreenConnected = 'SIM';
        button.removeAttribute('onclick');

        button.addEventListener(
          'click',
          event => {
            event.preventDefault();
            event.stopImmediatePropagation();
            requestTvFullscreen();
          },
          true
        );
      } catch (error) {
        console.warn(
          'Não foi possível conectar o botão Tela cheia:',
          error
        );
      }
    }

    function afterViewportChange() {
      scheduleFit();
      window.setTimeout(connectFullscreenButton, 300);
    }

    window.addEventListener('resize', afterViewportChange);
    window.addEventListener('orientationchange', afterViewportChange);

    window.visualViewport?.addEventListener(
      'resize',
      afterViewportChange
    );

    window.visualViewport?.addEventListener(
      'scroll',
      fitTv
    );

    document.addEventListener(
      'fullscreenchange',
      afterViewportChange
    );

    document.addEventListener(
      'webkitfullscreenchange',
      afterViewportChange
    );

    document.addEventListener(
      'MSFullscreenChange',
      afterViewportChange
    );

    if ('ResizeObserver' in window) {
      new ResizeObserver(scheduleFit)
        .observe(document.documentElement);
    }

    document
      .getElementById('tvFrame')
      .addEventListener('load', () => {
        document
          .getElementById('tvLoading')
          .classList.add('hidden');

        connectFullscreenButton();
        scheduleFit();

        [300, 700, 1400, 2500].forEach(delay => {
          window.setTimeout(connectFullscreenButton, delay);
        });
      });

    scheduleFit();
  </script>
</body>
</html>
